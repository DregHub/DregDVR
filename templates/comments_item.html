<div class="comment">
    <div class="header">
        <div class="post_info">
            {{TIME_STR}} Comment by: 
            <a href="https://www.youtube.com/channel/{{AUTHOR_ID}}" target="_blank">
                <strong>{{AUTHOR_NAME}}</strong>
            </a>

            <!-- Hidden author_id field -->
            <input type="hidden" name="author_id" value="{{AUTHOR_ID}}">

            {{USER_BANNED_BANNER}}

        </div>
    </div>
    <div class="post_content">
        {{SAFE_TEXT}}<br>{{MEDIA_HTML}}

        {{REMOVED_POST_BANNER}}

        <!-- Hidden post_id field -->
        <input type="hidden" name="post_id" value="{{POST_ID}}">
    </div>
</div>
