<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <style>
    a {
        color: inherit;
        text-decoration: none;
        text-shadow: 0 0 2px #666;
    }
    a:hover {
        text-decoration: underline;
    }
    img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        max-width: 100%;
        height: auto;
    }
    body {
        background-color: #121212;
        color: #b3b3b3;
        font-family: Arial, sans-serif;
        padding: 20px;
        text-shadow: 0 0 2px #333;
    }
    h1 {
        font-size: 2.8em;
        color: #cccccc;
        margin-bottom: 20px;
        text-shadow: 0 0 3px #444;
        text-align: center;
    }
    .comment {
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 15px;
        margin: 20px 120px;
        background-color: #1a1a1a;
        /* allow absolutely positioned banners inside */
        position: relative;
    }
    .comment .author {
        font-size: 1.3em;
        color: #e6b3b3;
        text-shadow: 0 0 2px #333;
        margin-bottom: 5px;
    }
    .comment .time {
        font-size: 0.9em;
        color: #888;
        margin-bottom: 10px;
    }
    .comment .content {
        margin-top: 10px;
        font-size: 1.6em;
        color: #b0b0b0;
    }
    .comment .media {
        margin-top: 10px;
    }
    .comment .media.images img {
        max-width: 80%;
        margin-top: 10px;
    }
    .badge {
        background: #2e2e2e;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 6px;
        font-size: 0.8em;
        color: #ccc;
    } 
    /* Modern dark‑mode warning banners */
    .banned_flag,
    .removed_flag {
        background: linear-gradient(180deg, #3a0f0f, #2a0b0b);
        color: #e6b3b3;
        font-weight: 700;
        padding: 12px 18px;
        margin: 12px 0;
        border-radius: 6px;
        font-size: 17px;
        text-align: center;
        user-select: none;
        pointer-events: none;
        display: block;

        border: 1px solid #5c1f1f;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);

        /* softer text glow */
        text-shadow:
            0 0 3px rgba(0, 0, 0, 0.6),
            0 0 6px rgba(0, 0, 0, 0.4);
    }

    /* removed posts should float in the bottom-right of their comment container */
    .removed_flag {
        position: absolute;
        bottom: 10px;
        right: 10px;
    }

    .inline_banned {
    margin-left: 8px;
    }
    .banned_flag.inline_banned {
        display: inline;
        background: #d32f2f;
        color: white;
        padding: 0 6px;
        border-radius: 10px;
        font-size: 0.8em;
        font-weight: bold;
        margin: 0;
        border: none;
        box-shadow: none;
        text-shadow: none;
    }
    .inline_removed {
        display: inline;
        background: #d32f2f;
        color: white;
        padding: 0 6px;
        border-radius: 10px;
        font-size: 0.8em;
        font-weight: bold;
        margin: 0;
        border: none;
        box-shadow: none;
        text-shadow: none;
    }
    .post_info {
    display: flex;
    align-items: center;
    gap: 6px;
    }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
{{COMMENTS}}
</body>
</html>
