<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <style>
    a {
        color: inherit;
        text-decoration: none;
        text-shadow: 0 0 2px #666;
    }
    a:hover {
        text-decoration: underline;
    }
    img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        max-width: 100%;
        height: auto;
    }
    body {
        background-color: #121212;
        color: #999999;
        font-family: Arial, sans-serif;
        padding: 20px;
        text-shadow: 0 0 2px #444;
    }
    h1 {
        font-size: 2.8em;
        color: #aaaaaa;
        margin-bottom: 20px;
        text-shadow: 0 0 3px #555;
        text-align: center;
    }
    .comment {
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        margin-left: 120px;
        margin-right: 120px;
        margin-bottom: 20px;
        background-color: #1e1e1e;
    }
    .comment .author {
        font-size: 1.3em;
        color: #90caf9;
        text-shadow: 0 0 2px #444;
        margin-bottom: 5px;
    }
    .comment .time {
        font-size: 0.9em;
        color: #888888;
        text-shadow: 0 0 2px #333;
        margin-bottom: 10px;
    }
    .comment .content {
        margin-top: 10px;
        font-size: 1.1em;
        color: #999999;
        text-shadow: 0 0 2px #444;
    }
    .comment .media {
        margin-top: 10px;
    }
    .comment .media.images img {
        max-width: 80%;
        margin-top: 10px;
    }
    .badge {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 6px;
        font-size: 0.8em;
        color: #ccc;
    }
    </style>
</head>
<body>
<h1>{{TITLE}}</h1>
{{COMMENTS}}
</body>
</html>
