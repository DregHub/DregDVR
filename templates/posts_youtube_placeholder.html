<div class="yt-placeholder" data-vid="{{VID}}" style="position:relative;max-width:560px;margin-top:10px;">
<img src="{{THUMB}}" alt="YouTube thumbnail" style="width:100%;height:auto;display:block;" />
<div class="yt-play" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;">
<svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
<div class="yt-spinner" style="display:none;width:48px;height:48px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);"></div>
<div style="text-align:center;margin-top:6px;">
<a href="https://www.youtube.com/watch?v={{VID}}" target="_blank" style="color:#90caf9;">Watch on YouTube</a></div>
</div>
