<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <style>
    a {
        color: inherit;
        text-decoration: none;
        text-shadow: 0 0 2px #666;
    }
    a:hover {
        text-decoration: underline;
    }
    img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        max-width: 100%;
        height: auto;
    }
    body {
        background-color: #121212;
        color: #999999;
        font-family: Arial, sans-serif;
        padding: 20px;
        text-shadow: 0 0 2px #444;
    }
    h1 {
        font-size: 2.8em;
        color: #aaaaaa;
        margin-bottom: 20px;
        text-shadow: 0 0 3px #555;
    }
    .post {
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        margin-left: 120px;
        margin-right: 120px;
        margin-bottom: 20px;
        background-color: #1e1e1e;
    }
    .title {
        font-size: 2.4em;
        color: #789abc;
        text-shadow: 0 0 2px #444;
    }
    .author {
        font-size: 1.3em;
        color: #888888;
        text-shadow: 0 0 2px #333;
    }
    .content {
        margin-top: 10px;
        font-size: 1.5em;
        color: #999999;
        text-shadow: 0 0 2px #444;
    }
    .badge {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 6px;
        font-size: 0.8em;
        color: #ccc;
    }
    </style>
</head>
<body>
<div><span class="title">{{TITLE}}</span></div>
</br>
</body>
</html>
